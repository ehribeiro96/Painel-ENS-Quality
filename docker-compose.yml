services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: itam
      POSTGRES_USER: itam
      POSTGRES_PASSWORD: itam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itam -d itam"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      ENS_BUILD_FRONTEND: "0"
      DATABASE_URL: postgresql+asyncpg://itam:itam@postgres:5432/itam
      REDIS_URL: redis://redis:6379/0
      APP_STARTUP_CHECKS: "1"
      APP_AUTO_MIGRATE: "1"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-estevao.quality@ens.edu.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD locally before starting the validation/runtime stack}
      ADMIN_NAME: ${ADMIN_NAME:-Estevão Ribeiro}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-15}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  app_data:
