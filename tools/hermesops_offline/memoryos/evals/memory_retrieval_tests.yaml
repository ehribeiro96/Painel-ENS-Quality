    description: .env files are prohibited
  - id: pfx_p12_prohibited
    description: PFX and P12 are prohibited
  - id: qdrant_collection_hml
    description: future Qdrant collection must be HML scoped
  - id: compose_project_hml
    description: future compose project must be HML scoped
  - id: candidate_warns
    description: candidate memory requires warning
  - id: approved_answer
    description: approved memory can be used in responses
  - id: rejected_blocked
    description: rejected memory is not surfaced in answers
  - id: secret_not_indexed
    description: secret values are never indexed
  - id: restricted_local_only
    description: restricted memory cannot go to external models
  - id: procedural_review
    description: procedural memory requires human review
  - id: conflict_superseded
    description: conflict and superseded metadata is required
