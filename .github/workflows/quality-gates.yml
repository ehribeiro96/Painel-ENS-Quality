name: Quality Gates

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare synthetic CI env
        shell: bash
        run: |
          jwt_name='JWT_SECRET_KEY'
          admin_name='ADMIN_PASSWORD'
          jwt_value="ci-jwt-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-not-production-with-minimum-length"
          admin_value="ci-admin-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-not-production"
          printf '%s=%s\n' "$jwt_name" "$jwt_value" >> "$GITHUB_ENV"
          printf '%s=%s\n' "$admin_name" "$admin_value" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-legacy.txt
          pip install -r requirements-dev.txt
          pip install pytest

      - name: Python compile
        run: python -m compileall -q backend/app backend/alembic tests

      - name: Backend regression tests
        run: PYTHONPATH=backend python -m pytest -s -q

      - name: Ruff check
        run: python -m ruff check backend tests scripts

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/itam-platform/package-lock.json

      - name: Frontend build
        working-directory: frontend/itam-platform
        run: |
          npm ci
          npm run build

      - name: Docker Compose config
        run: docker compose config --services

      - name: Secret pattern scan
        shell: bash
        run: |
          smtp_key='ENS_SMTP_PASSWORD'
          jwt_default='JWT_SECRET_KEY=change'
          jwt_default+='-me'
          ms_client='ms-client'
          ms_client+='-secret'
          super_key='super'
          super_key+='-secret-key'
          ens_upper='Ens@'
          ens_upper+='2026'
          ens_lower='ens@'
          ens_lower+='2025'
          smtp_quoted="${smtp_key}=\"mar"
          smtp_quoted+='car"'
          smtp_plain="${smtp_key}=mar"
          smtp_plain+='car'
          forbidden_patterns=(
            "$jwt_default"
            "$ms_client"
            "$super_key"
            "$ens_upper"
            "$ens_lower"
            "$smtp_quoted"
            "$smtp_plain"
          )

          for pattern in "${forbidden_patterns[@]}"; do
            if grep -RInF "$pattern" \
              --exclude-dir=.git \
              --exclude-dir=.venv \
              --exclude-dir=node_modules \
              --exclude-dir=uat_evidence \
              --exclude-dir=backups \
              --exclude-dir=secrets \
              --exclude-dir=reports \
              --exclude='*.log' \
              --exclude='*redacted*' \
              .; then
              exit 1
            fi
          done
