name: Quality Gates

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: "ci-test-jwt-secret-key-not-production-please-rotate-2026-06-29-with-minimum-length"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-legacy.txt
          pip install -r requirements-dev.txt
          pip install pytest

      - name: Python compile
        run: python -m compileall -q backend/app backend/alembic tests

      - name: Backend regression tests
        run: PYTHONPATH=backend python -m pytest -s -q

      - name: Ruff check
        run: python -m ruff check backend tests scripts

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/itam-platform/package-lock.json

      - name: Frontend build
        working-directory: frontend/itam-platform
        run: |
          npm ci
          npm run build

      - name: Docker Compose config
        run: docker compose config --services

      - name: Secret pattern scan
        shell: bash
        run: |
          ! grep -RInE 'JWT_SECRET_KEY=change-me|ms-client-secret|super-secret-key|Ens@2026|ens@2025|ENS_SMTP_PASSWORD="<SMTP_PASSWORD_REDACTED>"|ENS_SMTP_PASSWORD=<SMTP_PASSWORD_REDACTED>' \
            --exclude-dir=.git --exclude-dir=.venv --exclude-dir=node_modules --exclude-dir=uat_evidence \
            --exclude-dir=backups --exclude-dir=secrets .
