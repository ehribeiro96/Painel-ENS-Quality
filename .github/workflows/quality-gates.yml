name: Quality Gates

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql+asyncpg://apoema_ci:apoema-ci-only@127.0.0.1:5432/apoema_ci
      APOEMA_POSTGRES_TESTS: "1"

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: apoema_ci
          POSTGRES_PASSWORD: apoema-ci-only
          POSTGRES_DB: apoema_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apoema_ci -d apoema_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Prepare synthetic CI env
        shell: bash
        run: |
          jwt_name='JWT_SECRET_KEY'
          admin_name='ADMIN_PASSWORD'
          jwt_value="ci-jwt-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-not-production-with-minimum-length"
          admin_value="ci-admin-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-not-production"
          printf '%s=%s\n' "$jwt_name" "$jwt_value" >> "$GITHUB_ENV"
          printf '%s=%s\n' "$admin_name" "$admin_value" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-legacy.txt
          pip install -r requirements-dev.txt
          pip install pytest

      - name: Python compile
        run: python -m compileall -q backend/app backend/alembic tests scripts

      - name: Prepare disposable PostgreSQL schema
        working-directory: backend
        run: |
          python -m alembic upgrade head
          python -m alembic current | tee /tmp/alembic-current.txt
          grep -Fq '(head)' /tmp/alembic-current.txt

      - name: PostgreSQL concurrency tests (14 methods, actual zero skips)
        shell: bash
        run: |
          PYTHONPATH=backend python -c 'from app.core.database.session import engine; assert engine.dialect.name == "postgresql"; print(f"database_dialect={engine.dialect.name}")'
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=backend python -m pytest \
            -p no:cacheprovider \
            -s -q -o addopts='' \
            tests/test_import_concurrency_postgres.py \
            --junitxml=/tmp/import-concurrency-postgres.xml
          python scripts/assert_pytest_report.py \
            /tmp/import-concurrency-postgres.xml --exact-tests 25

      - name: Critical security tests (actual zero skips)
        shell: bash
        run: |
          PYTHONPATH=backend python -m pytest -q -o addopts='' \
            --junitxml=/tmp/critical-pytest.xml \
            tests/test_ai_feature_flag.py \
            tests/test_user_permission_boundaries.py \
            tests/test_health_endpoints.py \
            tests/test_macro_idempotency.py \
            tests/test_import_ai_safety.py \
            tests/test_pr1_remediation_contracts.py \
            tests/test_authprovider_strictmode_boot_contract.py \
            tests/test_auth_session_hardening.py \
            tests/test_login_frontend_contract.py
          python scripts/assert_pytest_report.py /tmp/critical-pytest.xml

      - name: Backend regression tests
        run: PYTHONPATH=backend python -m pytest -s -q

      - name: Ruff check
        run: python -m ruff check backend tests scripts

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/itam-platform/package-lock.json

      - name: Frontend build
        working-directory: frontend/itam-platform
        run: |
          npm ci
          npm run build
          npm audit --omit=dev --audit-level=moderate

      - name: Docker Compose config
        run: docker compose config --services

      - name: Secret pattern scan
        shell: bash
        run: |
          smtp_key='ENS_SMTP_PASSWORD'
          jwt_default='JWT_SECRET_KEY=change'
          jwt_default+='-me'
          ms_client='ms-client'
          ms_client+='-secret'
          super_key='super'
          super_key+='-secret-key'
          ens_upper='Ens@'
          ens_upper+='2026'
          ens_lower='ens@'
          ens_lower+='2025'
          smtp_quoted="${smtp_key}=\"mar"
          smtp_quoted+='car"'
          smtp_plain="${smtp_key}=mar"
          smtp_plain+='car'
          forbidden_patterns=(
            "$jwt_default"
            "$ms_client"
            "$super_key"
            "$ens_upper"
            "$ens_lower"
            "$smtp_quoted"
            "$smtp_plain"
          )

          for pattern in "${forbidden_patterns[@]}"; do
            if grep -RInF "$pattern" \
              --exclude-dir=.git \
              --exclude-dir=.venv \
              --exclude-dir=node_modules \
              --exclude-dir=uat_evidence \
              --exclude-dir=backups \
              --exclude-dir=secrets \
              --exclude-dir=reports \
              --exclude='*.log' \
              --exclude='*redacted*' \
              .; then
              exit 1
            fi
          done
