[pytest]
testpaths =
    tests
norecursedirs =
    .git
    .venv
    google-cloud-sdk
    frontend
    node_modules
    imports
    exports
    _validation
markers =
    unit: fast isolated unit tests
    integration: tests that require service integration or multiple layers
    smoke: lightweight runtime/smoke checks
    operational: environment-dependent checks for local/dev operations
    security: security and hardening checks
    ai_chat: AI Chat provider/API/rate-limit checks
    imports: import pipeline, parsing, normalization and conflict tests
    legacy: legacy admin/assinaturas checks
