{% extends "base.html" %}
{% block caller %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow-card">
      <div class="card-body">
        <h2 class="h5 mb-3" style="color:var(--ens-primary)">Alterar senha</h2>
        {% if error %}
          <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}
        <form method="post" class="row g-3">
          {{ csrf_field() }}
          <div class="col-12">
            <label class="form-label">Senha atual</label>
            <input class="form-control" name="current" type="password" required>
          </div>
          <div class="col-12">
            <label class="form-label">Nova senha</label>
            <input class="form-control" name="new1" type="password" minlength="6" required>
          </div>
          <div class="col-12">
            <label class="form-label">Confirmar nova senha</label>
            <input class="form-control" name="new2" type="password" minlength="6" required>
          </div>
          <div class="col-12">
            <button class="btn btn-ens" type="submit">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
