{% extends "base.html" %}
{% block caller %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow-card">
      <div class="card-body">
        <h2 class="h5 mb-3" style="color:var(--ens-primary)">Acesso restrito (somente TI)</h2>
        {% if error %}
          <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('admin.login') }}" class="row g-3">
          {{ csrf_field() }}
          <div class="col-12">
            <label class="form-label">Usuario</label>
            <input class="form-control" name="user" placeholder="Usuario" required>
          </div>
          <div class="col-12">
            <label class="form-label">Senha</label>
            <input class="form-control" name="pass" type="password" placeholder="Senha" required>
          </div>
          <div class="col-12">
            <button class="btn btn-ens" type="submit">Entrar</button>
          </div>
          <div class="col-12">
            <p class="hint mb-0">Entre com Usuario e Senha de Administrador</p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
